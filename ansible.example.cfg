[defaults]
# Envanter dosyasının yerini sabitleyelim
inventory = ./inventory/netboxinv4win.yml

# Burayı vault encrypt yaptıktan sonra aç
#vault_password_file = ./.vault_pass

# SSH/WinRM bağlantı hatalarında daha detaylı bilgi verir
host_key_checking = False

# Python yorumlayıcısını otomatik bulması için (Windows için kritik)
interpreter_python = auto_silent

deprecation_warnings = False

# Playbook çıktılarını daha okunabilir yapar
# stdout_callback = yaml

[privilege_escalation]
become = False