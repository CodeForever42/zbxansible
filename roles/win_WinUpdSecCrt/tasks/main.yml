---
# tasks file for win_WinUpdSecCrt

- name: Windows Update ve Reboot Planlama Yönetimi
  block:

    # ------------------------------------------------------
    - name: Windows Update klasörünü garanti altına al
      ansible.windows.win_file:
        path: C:\wUpdLog
        state: directory

    # ------------------------------------------------------
    - name: Install security, critical and rollup updates (sync, stabil)
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
          - UpdateRollups
        reboot: false
        log_path: C:\wUpdLog\ansible_wu.txt
      register: returned
      failed_when: false

    # ------------------------------------------------------
    - name: Update sonucu debug
      debug:
        msg:
          - "Installed: {{ returned.installed_update_count | default(0) }}"
          - "Failed: {{ returned.failed_update_count | default(0) }}"
          - "Reboot required: {{ returned.reboot_required | default(false) }}"

    # ------------------------------------------------------
    - name: Normal akışta reboot gerekiyorsa zamanlanmış görevi ekle
      include_role:
        name: win_schReboot
      when: returned.reboot_required | default(false)

  rescue:

    # ------------------------------------------------------
    - name: Reboot gerekiyorsa (hata durumunda da) zamanlanmış görevi ekle
      include_role:
        name: win_schReboot
      when: >
        (returned is defined and returned.reboot_required | default(false)) or
        (ansible_failed_result.msg is defined and
         ansible_failed_result.msg is search("reboot"))

    # ------------------------------------------------------
    - name: Hatayı yumuşat (container ölmesin)
      debug:
        msg:
          - "Windows Update sırasında hata alındı."
          - "Reboot gerekiyorsa planlandı."
          - "Bu durum Zabbix tarafında SUCCESS olarak değerlendirilebilir."

    # ------------------------------------------------------
    - name: Hard fail (isteğe bağlı - default kapalı)
      fail:
        msg: "Windows update kritik hata verdi!"
      when: false