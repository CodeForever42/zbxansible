---
# tasks file for win_WinUpdSecCrt
- name: Windows Update ve Reboot Planlama Yönetimi
  block:
    - name: Install all security, critical Updates
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
          - UpdateRollups
        reboot: false
        log_path: C:\wUpdLog\ansible_wu.txt
      async: 7200
      poll: 0
      register: returned

    - name: Normal akışta reboot gerekiyorsa zamanlanmış görevi ekle
      include_role:
        name: win_schReboot
      when: returned.reboot_required | default(false)

  rescue:
    - name: Reboot hatası alındığında zamanlanmış görevi yine de ekle
      include_role:
        name: win_schReboot
      # Eğer hata mesajında "reboot is required" geçiyorsa rolü çalıştır
      when: ansible_failed_result.msg is search("reboot is required")

    - name: Hatayı görmezden gel ve Zabbix'e başarı gönder
      debug:
        msg: "Reboot planlandığı için bu hata Zabbix tarafında 'Success' sayılacak."