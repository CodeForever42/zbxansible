- name: Degiskenleri Hazirla
  set_fact:
    r_days_val: "{{ r_after_days | default(1) | int }}"
    r_time_val: "{{ r_time | default('03:00') | trim }}"

- name: Tek seferlik reboot görevi oluştur
  ansible.windows.win_powershell:
    script: |
      # 1. Senin set_fact'ten gelen değerleri PowerShell değişkenine alıyoruz
      $DaysVal = [int]{{ r_days_val }}
      $TimeVal = "{{ r_time_val }}"

      # 2. {} veya boş gelirse 03:00'e çek (Emniyet kemeri)
      if ($TimeVal -eq "" -or $TimeVal -eq "{}") { $TimeVal = "03:00" }

      # 3. Zaman Objesini Hesapla (Dili, formatı, noktayı, virgülü umursamaz)
      $targetDate = (Get-Date).AddDays($DaysVal).Date
      if ($TimeVal -notmatch ':\d{2}:\d{2}$') { $TimeVal = "$TimeVal:00" }
      $ts = [timespan]$TimeVal
      $finalDateTime = $targetDate + $ts

      # 4. Eski görevi temizle (İsim: Ansible_Reboot)
      Unregister-ScheduledTask -TaskName "Ansible_Reboot" -Confirm:$false -ErrorAction SilentlyContinue

      # 5. Görevi Oluştur
      $action = New-ScheduledTaskAction -Execute "shutdown.exe" -Argument "/r /f /t 0"
      $trigger = New-ScheduledTaskTrigger -Once -At $finalDateTime
      
      # Principal ekleyelim ki SYSTEM olarak en yetkili şekilde çalışsın
      $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest

      Register-ScheduledTask -TaskName "Ansible_Reboot" `
                             -Action $action `
                             -Trigger $trigger `
                             -Principal $principal `
                             -Force

      # 6. Ansible'a "Oldu bu iş" raporu ver
      return @{
          "Task" = "Ansible_Reboot"
          "State" = (Get-ScheduledTask -TaskName "Ansible_Reboot").State
          "TargetTime" = $finalDateTime.ToString()
      }