- name: Degiskenleri Hazirla
  set_fact:
    r_days_val: "{{ r_after_days | default(1) | int }}"
    r_time_val: "{{ r_time | default('03:00') | trim }}"

- name: Tek seferlik reboot görevi oluştur
  ansible.windows.win_shell: >
    powershell.exe -ExecutionPolicy Bypass -Command
    "$days = [int]($env:R_DAYS);
    $time = $env:R_TIME;
    if ($time -eq '' -or $time -eq '{}') { $time = '03:00' };
    if ($time -notmatch ':\d{2}:\d{2}$') { $time = $time + ':00' };
    $culture = Get-Culture;
    $pattern = $culture.DateTimeFormat.ShortDatePattern;
    $dateStr = (Get-Date).AddDays($days).ToString($pattern);
    schtasks /delete /tn 'Ansible_Reboot' /f 2>$null;
    schtasks /create /tn 'Ansible_Reboot' /tr 'shutdown.exe /r /f /t 0' /sc once /sd $dateStr /st $time /ru SYSTEM /f"
  environment:
    R_DAYS: "{{ r_days_val }}"
    R_TIME: "{{ r_time_val }}"