- name: Degiskenleri Hazirla
  set_fact:
    r_days_val: "{{ r_after_days | int }}"
    r_time_val: "{{ r_time | trim }}"


- name: Tek seferlik reboot görevi oluştur
  ansible.windows.win_shell: |
    # 1. Değişkenleri al ve temizle
    $days = [int]"{{ r_days_val }}"
    $timeInput = "{{ r_time_val }}"

    # 2. Zaman Kontrolü: Eğer $timeInput boşsa veya garip bir metinse ({}) 03:00'e çek
    if ($timeInput -eq "" -or $timeInput -eq "{}") { $timeInput = "03:00" }

    # 3. Saat Formatı: Baştan tanımlıyoruz ki if bloğu dışında da yaşasın
    $timeStr = $timeInput
    if ($timeStr -notmatch ':\d{2}:\d{2}$') {
        $timeStr = "$timeStr:00"
    }

    # 4. Tarih Formatı: schtasks'ın ana dili (MM/dd/yyyy)
    $dt = (Get-Date).AddDays($days)
    $dateStr = $dt.ToString("MM/dd/yyyy")

    # 5. Temizlik ve Kayıt
    schtasks /delete /tn "Ansible_Reboot" /f 2>$null
    
    # Komutu tırnakları en güvenli haliyle kullanarak gönderiyoruz
    schtasks /create /tn "Ansible_Reboot" /tr "shutdown.exe /r /f /t 0" /sc once /sd $dateStr /st $timeStr /ru SYSTEM /f