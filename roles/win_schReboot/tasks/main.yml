- name: Degiskenleri Hazirla
  set_fact:
    r_days_val: "{{ r_after_days | int }}"
    r_time_val: "{{ r_time | trim }}"


- name: Tek seferlik reboot görevi oluştur
  ansible.windows.win_shell: |
    $days = [int]"{{ r_days_val }}"
    $time = "{{ r_time_val }}"
    
    # Zamanın formatını kontrol edelim (Bazen '3:0' gelebilir, '03:00' olmalı)
    if ($time -match '^\d{1,2}:\d{1,2}$') {
        $t = [datetime]::ParseExact($time, "H:m", $null)
        $timeStr = $t.ToString("HH:mm")
    } else {
        $timeStr = "03:00" # Hatalı format gelirse güvenli saat
    }

    $dt = (Get-Date).AddDays($days)
    $dateStr = $dt.ToString("MM/dd/yyyy")
    # --$dateStr = $dt.ToString((Get-Culture).DateTimeFormat.ShortDatePattern)
    
    # Değişkeni ${time} şeklinde izole ediyoruz ki yanındaki :00 ile karışmasın
    schtasks /create /tn "Ansible_Reboot" /tr "shutdown.exe /r /f /t 0" /sc once /sd $dateStr /st "$timeStr:00" /ru SYSTEM /f

